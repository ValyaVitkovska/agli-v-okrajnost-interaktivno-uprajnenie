<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамичен чертеж: Окръжност и ъгъл</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Персонализиран скролбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        body { margin: 0; padding: 0; background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        
        /* Гладки преходи */
        .smooth-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Анимация за плаващо лого (за fallback изображението) */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- ПОМОЩНИ ФУНКЦИИ ---
        const degToRad = (deg) => (deg * Math.PI) / 180;

        const getPoint = (cx, cy, radius, angleDeg) => ({
          x: cx + radius * Math.cos(degToRad(angleDeg)),
          y: cy + radius * Math.sin(degToRad(angleDeg)),
        });

        const getIntersection = (p1, p2, p3, p4) => {
          const denom = (p1.x - p2.x) * (p3.y - p4.y) - (p1.y - p2.y) * (p3.x - p4.x);
          if (Math.abs(denom) < 0.001) return null;
          const num1 = p1.x * p2.y - p1.y * p2.x;
          const num2 = p3.x * p4.y - p3.y * p4.x;
          return {
            x: (num1 * (p3.x - p4.x) - (p1.x - p2.x) * num2) / denom,
            y: (num1 * (p3.y - p4.y) - (p1.y - p2.y) * num2) / denom,
          };
        };

        const describeArc = (x, y, radius, startAngle, endAngle) => {
          const start = getPoint(x, y, radius, startAngle);
          const end = getPoint(x, y, radius, endAngle);
          const largeArcFlag = endAngle - startAngle <= 180 ? '0' : '1';
          return `M ${start.x} ${start.y} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${end.x} ${end.y}`;
        };

        // --- КОМПОНЕНТИ ЗА МАТЕМАТИЧЕСКИ СИМВОЛИ ---
        const Arc = ({ children }) => (
          <span style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', fontStyle: 'italic', fontFamily: '"Times New Roman", Times, serif', lineHeight: '1', padding: '0 2px', verticalAlign: 'bottom' }}>
            <svg width="100%" height="8" viewBox="0 0 20 10" preserveAspectRatio="none" style={{ overflow: 'visible', marginBottom: '-2px' }}>
              <path d="M 1 8 Q 10 -2 19 8" fill="none" stroke="currentColor" strokeWidth="1.5" />
            </svg>
            <span>{children}</span>
          </span>
        );

        const Ang = ({ children }) => (
          <span style={{ whiteSpace: 'nowrap' }}>
            <span style={{ fontFamily: 'Arial, sans-serif' }}>∢</span>
            <span style={{ fontStyle: 'italic', fontFamily: '"Times New Roman", Times, serif' }}>{children}</span>
          </span>
        );

        const LABEL_MAP = {
          arcAB: <Arc>AB</Arc>,
          arcBM: <Arc>BM</Arc>,
          arcMN: <Arc>MN</Arc>,
          arcAKN: <Arc>AKN</Arc>,
          angleAOB: <Ang>AOB</Ang>,
          angleMAN: <Ang>MAN</Ang>,
          angleBAM: <Ang>BAM</Ang>,
          angleMBE: <Ang>MBE</Ang>,
          angleMPN: <Ang>MPN</Ang>,
          angleACB: <Ang>ACB</Ang>,
          angleKOA: <Ang>KOA</Ang>
        };

        const ALL_KEYS = Object.keys(LABEL_MAP);

        const GIVEN_TEMPLATES = [
          ['angleMAN', 'arcBM', 'angleAOB'],
          ['arcMN', 'angleBAM', 'arcAB'],
          ['angleMPN', 'angleMBE', 'arcAB'],
          ['angleKOA', 'arcBM', 'angleAOB'],
          ['angleKOA', 'arcMN', 'angleMBE']
        ];

        // --- ДИНАМИЧЕН ЧЕРТЕЖ ---
        const GeometryDrawing = ({ baseAngle, arcAB, arcBM, angleMAN, size = 600, givenKeys = [], vals = {} }) => {
          const cx = size / 2;
          const cy = size / 2;
          const R = size * 0.25;

          const points = useMemo(() => {
            const angleB = baseAngle;
            const B = getPoint(cx, cy, R, angleB);
            const angleA = angleB + arcAB;
            const A = getPoint(cx, cy, R, angleA);
            const angleM = angleB - arcBM;
            const M = getPoint(cx, cy, R, angleM);
            const arcMN = angleMAN * 2;
            const angleN = angleM - arcMN;
            const N = getPoint(cx, cy, R, angleN);
            
            const arcAN = 360 - arcAB - arcBM - arcMN;
            const angleK = angleA + arcAN / 2;
            const K = getPoint(cx, cy, R, angleK);
            
            const O = { x: cx, y: cy };
            const P = getIntersection(A, M, B, N);
            const C = getIntersection(A, N, B, M);
            const angleE1 = angleB - 90;
            const angleE2 = angleB + 90;
            const E_line_start = getPoint(B.x, B.y, R * 1.5, angleE1);
            const E_line_end = getPoint(B.x, B.y, R * 1.5, angleE2);
            const E = getPoint(B.x, B.y, R * 0.5, angleE1);
            
            const labelPositions = {};
            
            labelPositions.arcAB = getPoint(cx, cy, R * 1.15, angleB + arcAB / 2);
            labelPositions.arcBM = getPoint(cx, cy, R * 1.15, angleB - arcBM / 2);
            labelPositions.arcMN = getPoint(cx, cy, R * 1.15, angleM - arcMN / 2);
            labelPositions.arcAKN = getPoint(cx, cy, R * 1.15, angleA + arcAN / 2);

            labelPositions.angleAOB = getPoint(cx, cy, R * 0.25, angleB + arcAB / 2);
            labelPositions.angleKOA = getPoint(cx, cy, R * 0.35, angleA + arcAN / 4);

            const getBisector = (center, p1, p2, dist) => {
              if (!center || !p1 || !p2) return {x:0, y:0};
              let a1 = Math.atan2(p1.y - center.y, p1.x - center.x) * 180 / Math.PI;
              let a2 = Math.atan2(p2.y - center.y, p2.x - center.x) * 180 / Math.PI;
              if (a1 < 0) a1 += 360;
              if (a2 < 0) a2 += 360;
              let diff = a1 - a2;
              if (diff > 180) a2 += 360;
              else if (diff < -180) a1 += 360;
              return getPoint(center.x, center.y, dist, (a1 + a2) / 2);
            };

            labelPositions.angleMAN = getBisector(A, N, M, R * 0.45);
            labelPositions.angleBAM = getBisector(A, M, B, R * 0.45);
            labelPositions.angleMBE = getBisector(B, E_line_start, M, R * 0.45);
            labelPositions.angleMPN = getBisector(P, N, M, R * 0.4);
            labelPositions.angleACB = getBisector(C, A, B, R * 0.4);

            return { O, A, B, M, N, K, P, C, E_line_start, E_line_end, E, labelPositions };
          }, [baseAngle, arcAB, arcBM, angleMAN, cx, cy, R]);

          const { O, A, B, M, N, K, P, C, E_line_start, E_line_end, E, labelPositions } = points;
          const isPossible = arcAB + arcBM + (angleMAN * 2) < 360;

          if (!isPossible) return (
            <div className="flex flex-col items-center justify-center h-full w-full">
                <div className="bg-red-50 text-red-600 font-bold p-4 md:p-6 rounded-2xl border border-red-200 shadow-sm text-center">
                    <span className="text-2xl md:text-3xl block mb-2">⚠️</span>
                    <span className="text-sm md:text-base">Невалидна конфигурация на ъглите</span>
                </div>
            </div>
          );

          let minX = cx - R, maxX = cx + R, minY = cy - R, maxY = cy + R;
          const checkPt = (p) => {
            if (!p) return;
            if (p.x < minX) minX = p.x;
            if (p.x > maxX) maxX = p.x;
            if (p.y < minY) minY = p.y;
            if (p.y > maxY) maxY = p.y;
          };
          
          [A, B, M, N, K, P, C, labelPositions.arcBM].forEach(checkPt); 

          const vbW = maxX - minX;
          const vbH = maxY - minY;
          const padding = Math.max(vbW, vbH) * 0.12; 
          
          const finalX = minX - padding;
          const finalY = minY - padding;
          const finalW = vbW + 2 * padding;
          const finalH = vbH + 2 * padding;

          const scale = Math.max(finalW, finalH) / 600;

          const renderAngleMark = (center, p1, p2, radius, color, width=2) => {
            if (!center || !p1 || !p2) return null;
            let a1 = Math.atan2(p1.y - center.y, p1.x - center.x) * 180 / Math.PI;
            let a2 = Math.atan2(p2.y - center.y, p2.x - center.x) * 180 / Math.PI;
            if (a1 < 0) a1 += 360;
            if (a2 < 0) a2 += 360;
            let diff = Math.abs(a1 - a2);
            if (diff > 180) {
              if (a1 > a2) a2 += 360;
              else a1 += 360;
            }
            let startAngle = Math.min(a1, a2);
            let endAngle = Math.max(a1, a2);
            return <path d={describeArc(center.x, center.y, radius, startAngle, endAngle)} fill="none" stroke={color} strokeWidth={width * scale} opacity="0.6" strokeLinecap="round" />;
          };

          return (
            <svg viewBox={`${finalX} ${finalY} ${finalW} ${finalH}`} className="w-full h-auto max-h-[50vh] md:max-h-full" style={{ touchAction: "none", objectFit: "contain" }}>
              {/* Премахнат е градиентът, за да се вижда окръжността на 100% */}
              <circle cx={O.x} cy={O.y} r={R} fill="none" stroke="#334155" strokeWidth={2.5 * scale} />
              
              {givenKeys.includes('angleAOB') && renderAngleMark(O, B, A, R*0.16, "#9CA3AF", 15)}
              {givenKeys.includes('angleMAN') && renderAngleMark(A, M, N, R*0.33, "#3B82F6", 2.5)}
              {givenKeys.includes('angleBAM') && renderAngleMark(A, B, M, R*0.33, "#3B82F6", 2.5)}
              {givenKeys.includes('angleMBE') && renderAngleMark(B, E_line_start, M, R*0.33, "#F59E0B", 2.5)}
              {givenKeys.includes('angleMPN') && renderAngleMark(P, M, N, R*0.25, "#EF4444", 2.5)}
              {givenKeys.includes('angleACB') && renderAngleMark(C, A, B, R*0.25, "#EF4444", 2.5)}
              {givenKeys.includes('angleKOA') && renderAngleMark(O, K, A, R*0.25, "#8B5CF6", 2.5)}

              <line x1={O.x} y1={O.y} x2={A.x} y2={A.y} stroke="#cbd5e1" strokeWidth={1.5 * scale} strokeDasharray={`${6*scale},${6*scale}`} />
              <line x1={O.x} y1={O.y} x2={B.x} y2={B.y} stroke="#cbd5e1" strokeWidth={1.5 * scale} strokeDasharray={`${6*scale},${6*scale}`} />
              <line x1={O.x} y1={O.y} x2={K.x} y2={K.y} stroke="#94a3b8" strokeWidth={1.5 * scale} strokeDasharray={`${4*scale},${4*scale}`} />
              
              {C && (
                <React.Fragment>
                  <line x1={A.x} y1={A.y} x2={C.x} y2={C.y} stroke="#475569" strokeWidth={1.5 * scale} />
                  <line x1={B.x} y1={B.y} x2={C.x} y2={C.y} stroke="#475569" strokeWidth={1.5 * scale} />
                </React.Fragment>
              )}
              
              <line x1={A.x} y1={A.y} x2={M.x} y2={M.y} stroke="#475569" strokeWidth={1.5 * scale} />
              <line x1={B.x} y1={B.y} x2={N.x} y2={N.y} stroke="#475569" strokeWidth={1.5 * scale} />
              <line x1={A.x} y1={A.y} x2={B.x} y2={B.y} stroke="#475569" strokeWidth={1.5 * scale} />
              
              <line x1={E_line_start.x} y1={E_line_start.y} x2={E_line_end.x} y2={E_line_end.y} stroke="#334155" strokeWidth={2.5 * scale} strokeLinecap="round" />

              {[
                { p: O, label: "O", ox: 0, oy: 22 },
                { p: A, label: "A", ox: -16, oy: 16 },
                { p: B, label: "B", ox: 16, oy: 16 },
                { p: M, label: "M", ox: 16, oy: -16 },
                { p: N, label: "N", ox: -16, oy: -16 },
                { p: K, label: "K", ox: -22, oy: 0 },
                { p: P, label: "P", ox: 0, oy: -18 },
                { p: C, label: "C", ox: 0, oy: -22 },
                { p: E, label: "E", ox: 16, oy: -16 }
              ].map((pt, i) => pt.p && (
                <g key={i}>
                  <circle cx={pt.p.x} cy={pt.p.y} r={3.5 * scale} fill="#3B82F6" stroke="#ffffff" strokeWidth={1.5 * scale} className="drop-shadow-sm" />
                  <text x={pt.p.x + pt.ox * scale} y={pt.p.y + pt.oy * scale} fontSize={17 * scale} fontFamily="serif" fontStyle="italic" fontWeight="bold" fill="#1e293b" textAnchor="middle" dominantBaseline="middle">
                    {pt.label}
                  </text>
                </g>
              ))}

              {givenKeys.map(key => {
                const pos = labelPositions[key];
                if (!pos) return null;
                return (
                  <g key={key}>
                    <text x={pos.x} y={pos.y} fontSize={15 * scale} fill="white" fontWeight="900" stroke="white" strokeWidth={4 * scale} strokeLinejoin="round" textAnchor="middle" dominantBaseline="middle">
                      {vals[key]}°
                    </text>
                    <text x={pos.x} y={pos.y} fontSize={15 * scale} fill="#ea580c" fontWeight="900" textAnchor="middle" dominantBaseline="middle">
                      {vals[key]}°
                    </text>
                  </g>
                );
              })}
            </svg>
          );
        };

        // --- ОСНОВНО ПРИЛОЖЕНИЕ ---
        function GeometryApp() {
          const [currentScreen, setCurrentScreen] = useState('home');
          
          const [baseAngle, setBaseAngle] = useState(30);
          const [arcAB, setArcAB] = useState(120);
          const [arcBM, setArcBM] = useState(120);
          const [angleMAN, setAngleMAN] = useState(20);
          
          const [mode, setMode] = useState('learn');
          const [userAnswers, setUserAnswers] = useState({});
          const [isPrintPreview, setIsPrintPreview] = useState(false);
          const [isGenerating, setIsGenerating] = useState(false);
          
          const [isTeacherMode, setIsTeacherMode] = useState(false);
          const [clickCount, setClickCount] = useState(0);

          const [variants, setVariants] = useState([]);
          const [interactiveGivenKeys, setInteractiveGivenKeys] = useState(GIVEN_TEMPLATES[0]);

          useEffect(() => {
            if (clickCount === 5) {
              setIsTeacherMode(true);
              setClickCount(0);
            } else if (clickCount > 0) {
              const timer = setTimeout(() => setClickCount(0), 800);
              return () => clearTimeout(timer);
            }
          }, [clickCount]);

          const correctAnswers = useMemo(() => {
            const arcMN = angleMAN * 2;
            const arcAN = 360 - arcAB - arcBM - arcMN;
            return {
              arcAB: arcAB, arcBM: arcBM, arcMN: arcMN, arcAKN: arcAN, 
              angleAOB: arcAB, angleMAN: angleMAN, angleBAM: arcBM / 2, 
              angleMBE: arcBM / 2, angleMPN: (arcAB + arcMN) / 2, 
              angleACB: Math.abs(arcAB - arcMN) / 2, angleKOA: arcAN / 2
            };
          }, [arcAB, arcBM, angleMAN]);

          const isPossible = arcAB + arcBM + (angleMAN * 2) < 360;

          const handleAnswerChange = (field, value) => {
            setUserAnswers(prev => ({ ...prev, [field]: value }));
          };

          const clearAnswers = () => setUserAnswers({});

          const generateNewInteractiveProblem = () => {
            let v_arcAB, v_arcBM, v_angleMAN, arcMN, arcAN;
            do {
              v_arcAB = Math.floor(Math.random() * 8 + 5) * 10; 
              v_arcBM = Math.floor(Math.random() * 8 + 5) * 10; 
              v_angleMAN = Math.floor(Math.random() * 5 + 3) * 5; 
              arcMN = v_angleMAN * 2;
              arcAN = 360 - v_arcAB - v_arcBM - arcMN;
            } while (v_arcAB + v_arcBM + arcMN >= 340 || arcAN < 20 || Math.abs(v_arcAB - arcMN) < 30);
            
            setArcAB(v_arcAB);
            setArcBM(v_arcBM);
            setAngleMAN(v_angleMAN);

            const newTemplate = GIVEN_TEMPLATES[Math.floor(Math.random() * GIVEN_TEMPLATES.length)];
            setInteractiveGivenKeys(newTemplate);
            clearAnswers();
          };

          const handleGenerateAndPrint = () => {
            setIsGenerating(true);
            let newVariants = [];
            let attempts = 0;

            while (newVariants.length < 17 && attempts < 2000) {
              attempts++;
              const v_arcAB = Math.floor(Math.random() * 8 + 5) * 10; 
              const v_arcBM = Math.floor(Math.random() * 8 + 5) * 10; 
              const v_angleMAN = Math.floor(Math.random() * 5 + 3) * 5; 
              const arcMN = v_angleMAN * 2;
              
              if (v_arcAB + v_arcBM + arcMN >= 340) continue; 
              const arcAN = 360 - v_arcAB - v_arcBM - arcMN;
              if (arcAN < 20) continue;
              if (Math.abs(v_arcAB - arcMN) < 30) continue;

              const vals = {
                arcAB: v_arcAB, arcBM: v_arcBM, arcMN: arcMN, arcAKN: arcAN,
                angleAOB: v_arcAB, angleMAN: v_angleMAN, angleBAM: v_arcBM / 2,
                angleMBE: v_arcBM / 2, angleMPN: (v_arcAB + arcMN) / 2,
                angleACB: Math.abs(v_arcAB - arcMN) / 2, angleKOA: arcAN / 2
              };

              const givenKeys = GIVEN_TEMPLATES[Math.floor(Math.random() * GIVEN_TEMPLATES.length)];
              const soughtKeys = ALL_KEYS.filter(k => !givenKeys.includes(k));

              newVariants.push({ id: newVariants.length + 1, arcAB: v_arcAB, arcBM: v_arcBM, angleMAN: v_angleMAN, givenKeys, soughtKeys, vals });
            }

            setVariants(newVariants);
            setIsPrintPreview(true);
            setIsGenerating(false);

            setTimeout(() => { try { window.print(); } catch (err) { } }, 1500); 
          };

          const executePrint = () => { try { window.print(); } catch (err) { } };

          // ====================================================================================
          // НАЧАЛНА СТРАНИЦА (HOME)
          // ====================================================================================
          if (currentScreen === 'home') {
            return (
              <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 flex flex-col font-sans text-slate-800 relative overflow-hidden px-4">
                <div className="absolute top-[-10%] left-[-10%] w-64 md:w-96 h-64 md:h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob"></div>
                <div className="absolute top-[20%] right-[-10%] w-64 md:w-96 h-64 md:h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-2000"></div>

                <main className="flex-grow flex flex-col items-center justify-center py-10 w-full max-w-6xl mx-auto z-10">
                  
                  <h1 className="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 via-blue-600 to-indigo-700 text-center mb-6 md:mb-8 drop-shadow-sm pb-2">
                    Окръжност и ъгли
                    <span className="block text-lg sm:text-2xl md:text-3xl font-medium text-slate-500 mt-2 md:mt-3 tracking-wide">Динамичен образователен модел</span>
                  </h1>

                  {/* ИЗОБРАЖЕНИЕ */}
                  <div className="w-full max-w-4xl bg-white p-3 md:p-4 rounded-3xl shadow-2xl border border-white/50 mb-10 md:mb-14 flex justify-center items-center overflow-hidden min-h-[200px] sm:min-h-[250px] md:min-h-[350px] transform hover:scale-[1.02] smooth-transition backdrop-blur-sm bg-white/70">
                    <img 
                      src="AOIU.png" 
                      alt="Окръжност и ъгъл лого" 
                      className="max-w-full h-auto max-h-[40vh] object-contain rounded-2xl"
                      onError={(e) => {
                        e.target.onerror = null; 
                        e.target.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 300'><rect width='400' height='300' fill='%23f8fafc'/><circle cx='200' cy='150' r='100' fill='none' stroke='%233b82f6' stroke-width='4'/><line x1='100' y1='150' x2='300' y2='150' stroke='%239ca3af' stroke-dasharray='5,5'/><path d='M 200 150 L 270 80' stroke='%23334155' stroke-width='2'/><path d='M 200 150 L 270 220' stroke='%23334155' stroke-width='2'/><circle cx='200' cy='150' r='4' fill='%23ef4444'/><text x='200' y='280' font-family='sans-serif' font-size='16' fill='%2364748b' text-anchor='middle'>Интерактивна Геометрия</text></svg>";
                        e.target.classList.add('animate-float');
                      }}
                    />
                  </div>

                  {/* КАРТИ */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 mb-10 md:mb-16 w-full max-w-4xl mx-auto">
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-lg hover:shadow-xl smooth-transition transform hover:-translate-y-1 border-t-4 border-blue-500">
                      <div className="w-10 h-10 md:w-12 md:h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-xl md:text-2xl mb-4 shadow-inner">📖</div>
                      <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-2 md:mb-3">Режим "Обучение"</h3>
                      <p className="text-slate-600 text-sm leading-relaxed">
                        Експериментирайте свободно! Променяйте стойностите чрез плъзгачите и наблюдавайте как се изменят геометричните зависимости в реално време.
                      </p>
                    </div>
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-lg hover:shadow-xl smooth-transition transform hover:-translate-y-1 border-t-4 border-emerald-500">
                      <div className="w-10 h-10 md:w-12 md:h-12 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 text-xl md:text-2xl mb-4 shadow-inner">✍️</div>
                      <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-2 md:mb-3">Режим "Тест"</h3>
                      <p className="text-slate-600 text-sm leading-relaxed">
                        Проверете знанията си с автоматично генерирани задачи. Въвеждайте отговорите си и получавайте незабавна обратна връзка.
                      </p>
                    </div>
                  </div>

                  {/* СТАРТ БУТОН */}
                  <button 
                    onClick={() => setCurrentScreen('app')}
                    className="group relative inline-flex items-center justify-center px-8 py-4 md:px-14 md:py-5 text-xl md:text-2xl font-black text-white bg-gradient-to-br from-cyan-400 via-blue-500 to-indigo-600 rounded-full shadow-[0_10px_40px_rgba(59,130,246,0.5)] border-b-[6px] md:border-b-[8px] border-indigo-800 hover:border-b-[3px] hover:translate-y-[3px] active:border-b-0 active:translate-y-[6px] md:hover:border-b-[4px] md:hover:translate-y-[4px] md:active:border-b-0 md:active:translate-y-[8px] transition-all duration-150 overflow-hidden w-full sm:w-auto"
                  >
                    <span className="absolute w-0 h-0 transition-all duration-500 ease-out bg-white rounded-full group-hover:w-[150%] group-hover:h-72 opacity-10"></span>
                    <span className="relative flex items-center gap-3">Да започваме! <span className="text-2xl md:text-3xl leading-none">🚀</span></span>
                  </button>

                </main>

                <footer className="w-full bg-white/50 backdrop-blur-md py-6 border-t border-slate-200 mt-auto z-10 px-4">
                  <div className="max-w-5xl mx-auto flex flex-col sm:flex-row justify-center items-center gap-4 sm:gap-6 md:gap-12 text-center">
                    <div className="px-2 md:px-6 py-1">
                      <span className="block text-[10px] md:text-[11px] uppercase tracking-widest text-slate-500 mb-1 font-semibold">Идея и методическа разработка</span>
                      <strong className="text-sm md:text-base text-slate-800 font-bold">Валя Витковска</strong>
                    </div>
                    <div className="hidden sm:block w-px h-8 md:h-10 bg-slate-300"></div>
                    <div className="px-2 md:px-6 py-1">
                      <span className="block text-[10px] md:text-[11px] uppercase tracking-widest text-slate-500 mb-1 font-semibold">Програмиране и реализация</span>
                      <strong className="text-sm md:text-base text-slate-800 font-bold">AI Gemini</strong>
                    </div>
                  </div>
                </footer>
              </div>
            );
          }

          // ====================================================================================
          // РЕЖИМ 1: ИЗГЛЕД ЗА ПЕЧАТ
          // ====================================================================================
          if (isPrintPreview) {
            return (
              <div style={{ backgroundColor: 'white', color: 'black', fontFamily: '"Times New Roman", Times, serif', padding: '0px', minHeight: '100vh', width: '100%' }}>
                <style>{`
                  @media print {
                    .no-print { display: none !important; }
                    body { background-color: white !important; margin: 0; padding: 0; color: black !important; }
                    @page { margin: 1cm; }
                    table { page-break-inside: auto; }
                    tr { page-break-inside: avoid; page-break-after: auto; }
                    td { page-break-inside: avoid; }
                  }
                `}</style>
                <div className="no-print" style={{ position: 'fixed', top: '15px', right: '15px', zIndex: 1000 }}>
                  <button onClick={executePrint} style={{ backgroundColor: '#4f46e5', color: 'white', padding: '10px 15px', borderRadius: '5px', fontWeight: 'bold', marginRight: '10px', border: 'none', borderBottom: '4px solid #3730a3', cursor: 'pointer', transition: 'all 0.1s' }} onMouseDown={e => { e.currentTarget.style.borderBottomWidth = '0px'; e.currentTarget.style.transform = 'translateY(4px)'; }} onMouseUp={e => { e.currentTarget.style.borderBottomWidth = '4px'; e.currentTarget.style.transform = 'translateY(0)'; }} onMouseLeave={e => { e.currentTarget.style.borderBottomWidth = '4px'; e.currentTarget.style.transform = 'translateY(0)'; }}>
                    🖨️ Принтирай (Ctrl+P)
                  </button>
                  <button onClick={() => setIsPrintPreview(false)} style={{ backgroundColor: '#64748b', color: 'white', padding: '10px 15px', borderRadius: '5px', fontWeight: 'bold', border: 'none', borderBottom: '4px solid #475569', cursor: 'pointer', transition: 'all 0.1s' }} onMouseDown={e => { e.currentTarget.style.borderBottomWidth = '0px'; e.currentTarget.style.transform = 'translateY(4px)'; }} onMouseUp={e => { e.currentTarget.style.borderBottomWidth = '4px'; e.currentTarget.style.transform = 'translateY(0)'; }} onMouseLeave={e => { e.currentTarget.style.borderBottomWidth = '4px'; e.currentTarget.style.transform = 'translateY(0)'; }}>
                    ❌ Назад
                  </button>
                </div>

                <div>
                  {variants.map((v) => (
                    <div key={v.id} style={{ pageBreakAfter: 'always', padding: '20px', maxWidth: '850px', margin: '0 auto', boxSizing: 'border-box' }}>
                      
                      <h1 style={{ fontSize: '24px', fontWeight: 'bold', textAlign: 'center', marginBottom: '30px', color: 'black' }}>
                        Контролна работа: Окръжност и ъгли
                      </h1>

                      <div style={{ borderBottom: '2px solid #000', paddingBottom: '10px', marginBottom: '20px', fontSize: '20px', fontWeight: 'bold', color: 'black' }}>
                        Вариант № {v.id}
                        <span style={{ float: 'right', fontSize: '16px', fontWeight: 'normal', marginTop: '4px' }}>Име: ........................................................</span>
                        <div style={{ clear: 'both' }}></div>
                      </div>
                      
                      <div style={{ fontSize: '18px', color: 'black', marginBottom: '15px', lineHeight: '1.5', fontFamily: '"Times New Roman", Times, serif' }}>
                        На чертежа точките <i>A, B, M, N</i> и <i>K</i> лежат на окръжност с център <i>O</i>. Правата <i>BE</i> е допирателна към окръжността, а отсечката <i>KO</i> е перпендикулярна на <i>AN</i>.
                      </div>
                      
                      <div style={{ fontSize: '18px', color: 'black', fontWeight: 'bold', border: '1px dashed #000', padding: '12px', marginBottom: '25px', fontFamily: 'Arial, sans-serif' }}>
                        Дадено: {v.givenKeys.map((key, i) => <span key={key}>{LABEL_MAP[key]} = {v.vals[key]}°{i < v.givenKeys.length - 1 ? ', ' : ''}</span>)}.<br/>
                        Намерете:
                      </div>
                      
                      <table style={{ width: '100%', fontSize: '18px', color: 'black', fontWeight: 'bold', marginBottom: '30px', fontFamily: 'Arial, sans-serif' }}>
                        <tbody>
                          <tr>
                            <td style={{ paddingBottom: '15px' }}>а) {LABEL_MAP[v.soughtKeys[0]]} = ........</td>
                            <td style={{ paddingBottom: '15px' }}>б) {LABEL_MAP[v.soughtKeys[1]]} = ........</td>
                          </tr>
                          <tr>
                            <td style={{ paddingBottom: '15px' }}>в) {LABEL_MAP[v.soughtKeys[2]]} = ........</td>
                            <td style={{ paddingBottom: '15px' }}>г) {LABEL_MAP[v.soughtKeys[3]]} = ........</td>
                          </tr>
                          <tr>
                            <td style={{ paddingBottom: '15px' }}>д) {LABEL_MAP[v.soughtKeys[4]]} = ........</td>
                            <td style={{ paddingBottom: '15px' }}>е) {LABEL_MAP[v.soughtKeys[5]]} = ........</td>
                          </tr>
                          <tr>
                            <td style={{ paddingBottom: '15px' }}>ж) {LABEL_MAP[v.soughtKeys[6]]} = ........</td>
                            <td style={{ paddingBottom: '15px' }}>з) {LABEL_MAP[v.soughtKeys[7]]} = ........</td>
                          </tr>
                        </tbody>
                      </table>

                      <div style={{ textAlign: 'center', marginTop: '10px' }}>
                        <div style={{ display: 'inline-block', width: '100%', maxWidth: '600px' }}>
                          <GeometryDrawing baseAngle={20} arcAB={v.arcAB} arcBM={v.arcBM} angleMAN={v.angleMAN} givenKeys={v.givenKeys} vals={v.vals} />
                        </div>
                      </div>
                      
                    </div>
                  ))}
                </div>

                <div style={{ pageBreakBefore: 'always', breakBefore: 'page', marginTop: '40px', padding: '20px' }}>
                  <h2 style={{ fontSize: '22px', fontWeight: 'bold', textAlign: 'center', marginBottom: '20px', color: 'black' }}>Ключ с верни отговори (Оцветените полета са даденото по условие)</h2>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px', color: 'black', fontFamily: 'Arial, sans-serif' }}>
                    <thead>
                      <tr>
                        <th style={{ border: '1px solid #000', padding: '6px', backgroundColor: '#f3f4f6', textAlign: 'center' }}>Вар.</th>
                        {ALL_KEYS.map(k => <th key={k} style={{ border: '1px solid #000', padding: '6px', backgroundColor: '#f3f4f6', textAlign: 'center' }}>{LABEL_MAP[k]}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {variants.map(v => (
                        <tr key={`ans-${v.id}`}>
                          <td style={{ border: '1px solid #000', padding: '4px', fontWeight: 'bold', textAlign: 'center' }}>{v.id}</td>
                          {ALL_KEYS.map(k => {
                            const isGiven = v.givenKeys.includes(k);
                            return <td key={k} style={{ border: '1px solid #000', padding: '4px', textAlign: 'center', backgroundColor: isGiven ? '#e5e7eb' : 'transparent', fontWeight: isGiven ? 'bold' : 'normal' }}>{v.vals[k]}°</td>;
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          }

          // ====================================================================================
          // РЕЖИМ 2: ИНТЕРАКТИВЕН ИЗГЛЕД (ОСНОВНОТО ПРИЛОЖЕНИЕ)
          // ====================================================================================
          
          const displayGivenKeys = mode === 'learn' ? ['arcAB', 'arcBM', 'angleMAN'] : interactiveGivenKeys;
          const displaySoughtKeys = ALL_KEYS.filter(k => !displayGivenKeys.includes(k));

          return (
            <div className="flex flex-col md:flex-row min-h-screen md:h-screen w-full bg-slate-50 text-slate-800 font-sans">
              
              {/* ЛЯВ ПАНЕЛ (Контроли) */}
              <div className="w-full md:w-[45%] lg:w-[38%] p-4 sm:p-5 md:p-8 bg-white md:shadow-[10px_0_15px_-3px_rgba(0,0,0,0.05)] z-10 flex flex-col gap-4 md:gap-6 md:overflow-y-auto border-r border-slate-200">
                
                {/* Хедър с Навигация */}
                <div className="flex justify-between items-center bg-slate-50 p-2 md:p-2.5 rounded-2xl border border-slate-200 shadow-sm">
                  <button 
                    onClick={() => setCurrentScreen('home')}
                    className="text-white bg-gradient-to-r from-blue-500 to-indigo-500 font-bold p-2 md:p-2.5 rounded-xl shadow-lg shadow-blue-500/30 border border-b-[4px] border-indigo-700 hover:border-b-[2px] hover:translate-y-[2px] active:border-b-0 active:translate-y-[4px] transition-all flex-shrink-0"
                    title="Към началната страница"
                  >
                    <svg className="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                  </button>
                  <h1 
                    className="text-base sm:text-lg md:text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-indigo-700 cursor-pointer select-none text-right pr-2 relative"
                    onClick={() => setClickCount(prev => prev + 1)}
                  >
                    Окръжност и ъгли
                    {isTeacherMode && <span className="absolute mt-5 right-2 text-[9px] sm:text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold border border-green-200 shadow-sm whitespace-nowrap">Учителски режим</span>}
                  </h1>
                </div>
                
                {isTeacherMode && (
                  <button 
                    onClick={handleGenerateAndPrint}
                    disabled={isGenerating}
                    className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 md:py-3.5 rounded-xl shadow-md border-b-4 border-indigo-800 active:border-b-0 active:translate-y-1 transition-all disabled:opacity-50 flex items-center justify-center gap-2 text-base md:text-lg"
                  >
                    {isGenerating ? "⏳ Подготовка..." : "🖨️ Генерирай печат (17 вар.)"}
                  </button>
                )}

                {/* Табове (Превключватели) */}
                <div className="flex bg-slate-100 p-1 md:p-1.5 rounded-2xl shadow-inner border border-slate-200/60">
                  <button 
                    className={`flex-1 py-2 md:py-2.5 text-sm md:text-base font-bold rounded-xl smooth-transition ${mode === 'learn' ? 'bg-white shadow-md text-blue-600 border border-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`} 
                    onClick={() => { setMode('learn'); clearAnswers(); }}
                  >
                    📖 Обучение
                  </button>
                  <button 
                    className={`flex-1 py-2 md:py-2.5 text-sm md:text-base font-bold rounded-xl smooth-transition ${mode === 'test' ? 'bg-white shadow-md text-emerald-600 border border-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`} 
                    onClick={() => { setMode('test'); clearAnswers(); }}
                  >
                    ✍️ Тест
                  </button>
                </div>

                {!isPossible && <div className="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 md:p-4 text-sm font-bold rounded-r-xl shadow-sm">Невалидна конфигурация на ъглите!</div>}

                {/* Карта Условие */}
                <div className="p-4 md:p-5 bg-gradient-to-br from-amber-50 to-orange-50 rounded-2xl border border-amber-200/60 text-[14px] md:text-[15px] leading-relaxed text-slate-800 shadow-sm font-serif">
                  На чертежа точките <i>A, B, M, N</i> и <i>K</i> лежат на окръжност с център <i>O</i>. Правата <i>BE</i> е допирателна към окръжността, а отсечката <i>KO</i> е перпендикулярна на <i>AN</i>. 
                  <div className="mt-2 md:mt-3 p-2 md:p-3 bg-white/70 backdrop-blur-sm border border-amber-200 rounded-xl font-sans shadow-sm leading-normal">
                    Ако {displayGivenKeys.map((key, i) => <span key={key} className="whitespace-nowrap"><b>{LABEL_MAP[key]} = {correctAnswers[key]}°</b>{i < displayGivenKeys.length - 1 ? ', ' : ''}</span>)}, намерете:
                  </div>
                </div>

                {/* ЧЕРТЕЖ ЗА МОБИЛНИ (Появява се само на малки екрани ПОД условието!) */}
                <div className="flex md:hidden w-full bg-white shadow-sm border border-slate-200 rounded-2xl p-2 items-center justify-center relative my-1">
                   <GeometryDrawing baseAngle={baseAngle} arcAB={arcAB} arcBM={arcBM} angleMAN={angleMAN} givenKeys={displayGivenKeys} vals={correctAnswers} />
                </div>

                {/* Слайдери (само Обучение) */}
                {mode === 'learn' && (
                  <div className="space-y-3 md:space-y-4 p-4 md:p-5 bg-slate-50 rounded-2xl border border-slate-200">
                    <h3 className="text-[10px] md:text-[11px] font-extrabold text-slate-400 uppercase tracking-widest mb-2 md:mb-3 border-b border-slate-200 pb-2">Настройки на чертежа</h3>
                    <div>
                      <label className="flex justify-between text-[11px] md:text-xs mb-1 md:mb-1.5 text-slate-500 font-bold"><span>Ротация</span> <span className="bg-white px-2 py-0.5 rounded shadow-sm border border-slate-200">{baseAngle}°</span></label>
                      <input type="range" min="0" max="360" value={baseAngle} onChange={(e) => setBaseAngle(Number(e.target.value))} className="w-full accent-slate-400 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                    </div>
                    <div>
                      <label className="flex justify-between text-xs md:text-sm font-semibold mb-1 md:mb-1.5 text-slate-700"><span>{LABEL_MAP.arcAB} (и {LABEL_MAP.angleAOB})</span> <span className="bg-white px-2 py-0.5 rounded shadow-sm border border-slate-200 text-blue-600">{arcAB}°</span></label>
                      <input type="range" min="30" max="180" step="10" value={arcAB} onChange={(e) => setArcAB(Number(e.target.value))} className="w-full accent-blue-500 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                    </div>
                    <div>
                      <label className="flex justify-between text-xs md:text-sm font-semibold mb-1 md:mb-1.5 text-slate-700"><span>{LABEL_MAP.arcBM}</span> <span className="bg-white px-2 py-0.5 rounded shadow-sm border border-slate-200 text-blue-600">{arcBM}°</span></label>
                      <input type="range" min="30" max="180" step="10" value={arcBM} onChange={(e) => setArcBM(Number(e.target.value))} className="w-full accent-blue-500 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                    </div>
                    <div>
                      <label className="flex justify-between text-xs md:text-sm font-semibold mb-1 md:mb-1.5 text-slate-700"><span>Вписан {LABEL_MAP.angleMAN}</span> <span className="bg-white px-2 py-0.5 rounded shadow-sm border border-slate-200 text-blue-600">{angleMAN}°</span></label>
                      <input type="range" min="10" max="60" step="5" value={angleMAN} onChange={(e) => setAngleMAN(Number(e.target.value))} className="w-full accent-blue-500 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                    </div>
                  </div>
                )}

                {/* Отговори */}
                <div className={`${mode === 'learn' ? 'bg-blue-50/50 border-blue-100' : 'bg-emerald-50/50 border-emerald-100'} border p-4 md:p-5 rounded-2xl flex-grow mb-6 md:mb-0`}>
                  <h2 className={`text-[10px] md:text-[11px] font-extrabold uppercase tracking-widest mb-2 md:mb-3 border-b pb-2 ${mode === 'learn' ? 'text-blue-400 border-blue-200' : 'text-emerald-500 border-emerald-200'}`}>
                    {mode === 'learn' ? 'Решение (Автоматично)' : 'Въведете вашите отговори'}
                  </h2>
                  <ul className="space-y-1.5">
                    {displaySoughtKeys.map((key, i) => {
                      const valStr = userAnswers[key];
                      const isAnswered = valStr !== undefined && valStr !== '';
                      const isCorrect = isAnswered && parseFloat(valStr) === correctAnswers[key];
                      const isWrong = isAnswered && !isCorrect;

                      if (mode === 'learn') return (
                        <li key={key} className="flex justify-between items-center border-b border-blue-200/50 py-2 hover:bg-blue-100/50 px-2 md:px-3 rounded-xl smooth-transition text-[13px] sm:text-sm">
                          <span className="text-slate-700">{String.fromCharCode(1072 + i)}) Мярка на <b>{LABEL_MAP[key]}</b></span>
                          <span className="font-bold text-blue-700 text-sm md:text-base bg-white px-2 md:px-3 py-1 rounded-lg shadow-sm border border-blue-200">{correctAnswers[key]}°</span>
                        </li>
                      );
                      
                      return (
                        <li key={key} className="flex flex-wrap sm:flex-nowrap justify-between items-center border-b border-emerald-200/30 py-2 hover:bg-white/40 px-1.5 md:px-2 rounded-xl smooth-transition gap-2">
                          <span className="text-slate-700 font-medium text-[13px] sm:text-sm">{String.fromCharCode(1072 + i)}) Мярка на <b className="text-slate-900">{LABEL_MAP[key]}</b></span>
                          <div className="flex items-center gap-1 sm:gap-2 ml-auto">
                            <div className="relative">
                              <input 
                                type="number" 
                                value={userAnswers[key] || ''} 
                                onChange={(e) => handleAnswerChange(key, e.target.value)} 
                                placeholder="..."
                                className={`w-[60px] md:w-[72px] px-1 md:px-2 py-1.5 pr-4 md:pr-6 text-center font-bold border-2 rounded-xl outline-none smooth-transition bg-white shadow-sm text-sm md:text-base
                                  ${isCorrect ? 'border-emerald-400 text-emerald-700 bg-emerald-50 focus:border-emerald-500' : 
                                    isWrong ? 'border-red-400 text-red-700 bg-red-50 focus:border-red-500' : 
                                    'border-slate-200 focus:border-indigo-400 text-slate-800 focus:ring-4 focus:ring-indigo-100'}`} 
                              />
                              <span className="absolute right-1 md:right-2 top-1/2 -translate-y-1/2 text-slate-400 font-bold select-none pointer-events-none text-xs md:text-sm">°</span>
                            </div>
                            <span className="w-5 md:w-6 text-center text-base md:text-lg drop-shadow-sm select-none">
                              {isCorrect ? '✅' : isWrong ? '❌' : ''}
                            </span>
                          </div>
                        </li>
                      );
                    })}
                  </ul>

                  {mode === 'test' && (
                    <div className="mt-6 md:mt-8 flex flex-col sm:flex-row gap-2 md:gap-3">
                      <button 
                        onClick={generateNewInteractiveProblem} 
                        className="flex-1 bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 md:py-3.5 px-3 md:px-4 rounded-xl shadow-md border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center gap-2 text-sm md:text-base"
                      >
                        <span className="text-lg md:text-xl">🔄</span> Нова задача
                      </button>
                      <button 
                        onClick={clearAnswers} 
                        className="bg-white hover:bg-slate-50 text-slate-600 font-bold py-3 md:py-3.5 px-3 md:px-4 rounded-xl shadow-sm border-2 border-b-4 border-slate-200 active:border-b-2 active:translate-y-0.5 transition-all text-sm md:text-base"
                      >
                        Изчисти
                      </button>
                    </div>
                  )}
                </div>
              </div>

              {/* ДЕСЕН ПАНЕЛ (Чертеж за Десктоп и Таблет) */}
              <div className="hidden md:flex w-full md:w-[55%] lg:w-[62%] items-center justify-center p-6 lg:p-8 bg-slate-100 overflow-hidden relative border-l border-slate-200">
                <div className="w-full h-full max-w-4xl bg-white shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] rounded-[2rem] overflow-hidden p-6 lg:p-8 flex items-center justify-center relative border border-slate-200/60">
                   <GeometryDrawing baseAngle={baseAngle} arcAB={arcAB} arcBM={arcBM} angleMAN={angleMAN} givenKeys={displayGivenKeys} vals={correctAnswers} />
                </div>
              </div>
            </div>
          );
        }

        // Стартиране
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GeometryApp />);
    </script>
</body>
</html>
