<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамичен чертеж: Окръжност и ъгъл</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { margin: 0; padding: 0; background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .smooth-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- ПОМОЩНИ ФУНКЦИИ ---
        const degToRad = (deg) => (deg * Math.PI) / 180;

        const getPoint = (cx, cy, radius, angleDeg) => ({
          x: cx + radius * Math.cos(degToRad(angleDeg)),
          y: cy + radius * Math.sin(degToRad(angleDeg)),
        });

        const getIntersection = (p1, p2, p3, p4) => {
          const denom = (p1.x - p2.x) * (p3.y - p4.y) - (p1.y - p2.y) * (p3.x - p4.x);
          if (Math.abs(denom) < 0.001) return null;
          const num1 = p1.x * p2.y - p1.y * p2.x;
          const num2 = p3.x * p4.y - p3.y * p4.x;
          return {
            x: (num1 * (p3.x - p4.x) - (p1.x - p2.x) * num2) / denom,
            y: (num1 * (p3.y - p4.y) - (p1.y - p2.y) * num2) / denom,
          };
        };

        const describeArc = (x, y, radius, startAngle, endAngle) => {
          const start = getPoint(x, y, radius, startAngle);
          const end = getPoint(x, y, radius, endAngle);
          const largeArcFlag = endAngle - startAngle <= 180 ? '0' : '1';
          return `M ${start.x} ${start.y} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${end.x} ${end.y}`;
        };

        const seededRandom = (seed) => {
            const x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        };

        // --- КОМПОНЕНТИ ЗА МАТЕМАТИЧЕСКИ СИМВОЛИ ---
        const Arc = ({ children }) => (
          <span style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', fontStyle: 'italic', fontFamily: '"Times New Roman", Times, serif', lineHeight: '1', padding: '0 2px', verticalAlign: 'bottom' }}>
            <svg width="100%" height="8" viewBox="0 0 20 10" preserveAspectRatio="none" style={{ overflow: 'visible', marginBottom: '-2px' }}>
              <path d="M 1 8 Q 10 -2 19 8" fill="none" stroke="currentColor" strokeWidth="1.5" />
            </svg>
            <span>{children}</span>
          </span>
        );

        const Ang = ({ children }) => (
          <span style={{ whiteSpace: 'nowrap' }}>
            <span style={{ fontFamily: 'Arial, sans-serif' }}>∢</span>
            <span style={{ fontStyle: 'italic', fontFamily: '"Times New Roman", Times, serif' }}>{children}</span>
          </span>
        );

        const LABEL_MAP = {
          arcAB: <Arc>AB</Arc>, arcBM: <Arc>BM</Arc>, arcMN: <Arc>MN</Arc>, arcAN: <Arc>AN</Arc>,
          angleAOB: <Ang>AOB</Ang>, angleMAN: <Ang>MAN</Ang>, angleBAM: <Ang>BAM</Ang>,
          angleMBE: <Ang>MBE</Ang>, angleMPN: <Ang>MPN</Ang>, angleACB: <Ang>ACB</Ang>, 
          angleHalfK: <Ang>K</Ang>
        };

        const ALL_KEYS = ['arcAB', 'arcBM', 'arcMN', 'arcAN', 'angleAOB', 'angleMAN', 'angleBAM', 'angleMBE', 'angleMPN', 'angleACB', 'angleHalfK'];

        const renderLabel = (key, kChord) => {
            if (key === 'angleHalfK') {
                if (kChord === 'AB') return <Ang>KOA</Ang>;
                if (kChord === 'BM') return <Ang>KOB</Ang>;
                if (kChord === 'MN') return <Ang>KOM</Ang>;
                return <Ang>KOA</Ang>; 
            }
            return LABEL_MAP[key] || <span>{key}</span>;
        };

        const getTemplatesForKChord = (kChord) => {
            const baseTemplates = [
              ['angleMAN', 'arcBM', 'angleAOB'],
              ['arcMN', 'angleBAM', 'arcAB'],
              ['angleMPN', 'angleMBE', 'arcAB']
            ];
            let kTemplates = [];
            if (kChord === 'AN') {
               kTemplates.push(['angleHalfK', 'arcBM', 'angleAOB'], ['angleHalfK', 'arcMN', 'angleMBE']); 
            } else if (kChord === 'AB') {
               kTemplates.push(['angleHalfK', 'arcBM', 'angleMAN'], ['angleHalfK', 'arcMN', 'angleMBE']); 
            } else if (kChord === 'BM') {
               kTemplates.push(['angleHalfK', 'angleAOB', 'angleMAN'], ['angleHalfK', 'arcMN', 'arcAB']); 
            } else if (kChord === 'MN') {
               kTemplates.push(['angleHalfK', 'arcBM', 'angleAOB'], ['angleHalfK', 'angleMBE', 'arcAB']); 
            }
            return [...baseTemplates, ...kTemplates];
        };

        const GIVEN_TEMPLATES = getTemplatesForKChord('AN'); // Първоначален шаблон

        // --- ДИНАМИЧЕН ЧЕРТЕЖ ---
        const GeometryDrawing = ({ baseAngle, arcAB, arcBM, angleMAN, kChord = 'AN', size = 600, givenKeys = [], vals = {}, examWatermark = "" }) => {
          const cx = size / 2;
          const cy = size / 2;
          const R = size * 0.25;

          const points = useMemo(() => {
            const angleB = baseAngle;
            const B = getPoint(cx, cy, R, angleB);
            const angleA = angleB + arcAB;
            const A = getPoint(cx, cy, R, angleA);
            const angleM = angleB - arcBM;
            const M = getPoint(cx, cy, R, angleM);
            const arcMN = angleMAN * 2;
            const angleN = angleM - arcMN;
            const N = getPoint(cx, cy, R, angleN);
            
            const arcAN = 360 - arcAB - arcBM - arcMN;
            
            let angleK;
            if (kChord === 'AB') angleK = angleB + arcAB / 2;
            else if (kChord === 'BM') angleK = angleB - arcBM / 2;
            else if (kChord === 'MN') angleK = angleM - arcMN / 2;
            else angleK = angleA + arcAN / 2; 
            
            const K = getPoint(cx, cy, R, angleK);
            
            const O = { x: cx, y: cy };
            const P = getIntersection(A, M, B, N);
            const C = getIntersection(A, N, B, M);
            const angleE1 = angleB - 90;
            const angleE2 = angleB + 90;
            const E_line_start = getPoint(B.x, B.y, R * 1.5, angleE1);
            const E_line_end = getPoint(B.x, B.y, R * 1.5, angleE2);
            const E = getPoint(B.x, B.y, R * 0.5, angleE1);
            
            const labelPositions = {};
            labelPositions.arcAB = getPoint(cx, cy, R * 1.15, angleB + arcAB / 2);
            labelPositions.arcBM = getPoint(cx, cy, R * 1.15, angleB - arcBM / 2);
            labelPositions.arcMN = getPoint(cx, cy, R * 1.15, angleM - arcMN / 2);
            labelPositions.arcAN = getPoint(cx, cy, R * 1.15, angleA + arcAN / 2);
            labelPositions.angleAOB = getPoint(cx, cy, R * 0.25, angleB + arcAB / 2);

            const getBisector = (center, p1, p2, dist) => {
              if (!center || !p1 || !p2) return {x:0, y:0};
              let a1 = Math.atan2(p1.y - center.y, p1.x - center.x) * 180 / Math.PI;
              let a2 = Math.atan2(p2.y - center.y, p2.x - center.x) * 180 / Math.PI;
              if (a1 < 0) a1 += 360;
              if (a2 < 0) a2 += 360;
              let diff = a1 - a2;
              if (diff > 180) a2 += 360; else if (diff < -180) a1 += 360;
              return getPoint(center.x, center.y, dist, (a1 + a2) / 2);
            };

            let kP2;
            if (kChord === 'AB') kP2 = A; 
            else if (kChord === 'BM') kP2 = B; 
            else if (kChord === 'MN') kP2 = M; 
            else kP2 = A; 
            
            labelPositions.angleHalfK = getBisector(O, K, kP2, R * 0.35);
            labelPositions.angleMAN = getBisector(A, N, M, R * 0.45);
            labelPositions.angleBAM = getBisector(A, M, B, R * 0.45);
            labelPositions.angleMBE = getBisector(B, E_line_start, M, R * 0.45);
            labelPositions.angleMPN = getBisector(P, N, M, R * 0.4);
            labelPositions.angleACB = getBisector(C, A, B, R * 0.4);

            return { O, A, B, M, N, K, P, C, E_line_start, E_line_end, E, labelPositions, angleK };
          }, [baseAngle, arcAB, arcBM, angleMAN, kChord, cx, cy, R]);

          const { O, A, B, M, N, K, P, C, E_line_start, E_line_end, E, labelPositions, angleK } = points;
          const isPossible = arcAB + arcBM + (angleMAN * 2) < 360;

          if (!isPossible) return (
            <div className="flex flex-col items-center justify-center h-full w-full">
                <div className="bg-red-50 text-red-600 font-bold p-4 md:p-6 rounded-2xl border border-red-200 shadow-sm text-center">
                    <span className="text-2xl md:text-3xl block mb-2">⚠️</span>
                    <span className="text-sm md:text-base">Невалидна конфигурация на ъглите</span>
                </div>
            </div>
          );

          let minX = cx - R, maxX = cx + R, minY = cy - R, maxY = cy + R;
          const checkPt = (p) => {
            if (!p) return;
            if (p.x < minX) minX = p.x;
            if (p.x > maxX) maxX = p.x;
            if (p.y < minY) minY = p.y;
            if (p.y > maxY) maxY = p.y;
          };
          [A, B, M, N, K, P, C, labelPositions.arcBM].forEach(checkPt); 

          const vbW = maxX - minX;
          const vbH = maxY - minY;
          const padding = Math.max(vbW, vbH) * 0.12; 
          const finalX = minX - padding;
          const finalY = minY - padding;
          const finalW = vbW + 2 * padding;
          const finalH = vbH + 2 * padding;
          const scale = Math.max(finalW, finalH) / 600;

          const renderAngleMark = (center, p1, p2, radius, color, width=2) => {
            if (!center || !p1 || !p2) return null;
            let a1 = Math.atan2(p1.y - center.y, p1.x - center.x) * 180 / Math.PI;
            let a2 = Math.atan2(p2.y - center.y, p2.x - center.x) * 180 / Math.PI;
            if (a1 < 0) a1 += 360; if (a2 < 0) a2 += 360;
            let diff = Math.abs(a1 - a2);
            if (diff > 180) { if (a1 > a2) a2 += 360; else a1 += 360; }
            let startAngle = Math.min(a1, a2);
            let endAngle = Math.max(a1, a2);
            return <path d={describeArc(center.x, center.y, radius, startAngle, endAngle)} fill="none" stroke={color} strokeWidth={width * scale} opacity="0.6" strokeLinecap="round" />;
          };

          let kChordP1, kP2;
          if (kChord === 'AB') { kChordP1 = B; kP2 = A; }
          else if (kChord === 'BM') { kChordP1 = M; kP2 = B; }
          else if (kChord === 'MN') { kChordP1 = N; kP2 = M; }
          else { kChordP1 = N; kP2 = A; } 

          return (
            <svg viewBox={`${finalX} ${finalY} ${finalW} ${finalH}`} className="w-full h-auto max-h-[50vh] md:max-h-full" style={{ touchAction: "none", objectFit: "contain" }}>
              <circle cx={O.x} cy={O.y} r={R} fill="none" stroke="#334155" strokeWidth={2.5 * scale} />
              
              {givenKeys.includes('angleAOB') && renderAngleMark(O, B, A, R*0.16, "#9CA3AF", 15)}
              {givenKeys.includes('angleMAN') && renderAngleMark(A, M, N, R*0.33, "#3B82F6", 2.5)}
              {givenKeys.includes('angleBAM') && renderAngleMark(A, B, M, R*0.33, "#3B82F6", 2.5)}
              {givenKeys.includes('angleMBE') && renderAngleMark(B, E_line_start, M, R*0.33, "#F59E0B", 2.5)}
              {givenKeys.includes('angleMPN') && renderAngleMark(P, M, N, R*0.25, "#EF4444", 2.5)}
              {givenKeys.includes('angleACB') && renderAngleMark(C, A, B, R*0.25, "#EF4444", 2.5)}
              {givenKeys.includes('angleHalfK') && renderAngleMark(O, K, kP2, R*0.25, "#8B5CF6", 2.5)}

              <line x1={O.x} y1={O.y} x2={A.x} y2={A.y} stroke="#cbd5e1" strokeWidth={1.5 * scale} strokeDasharray={`${6*scale},${6*scale}`} />
              <line x1={O.x} y1={O.y} x2={B.x} y2={B.y} stroke="#cbd5e1" strokeWidth={1.5 * scale} strokeDasharray={`${6*scale},${6*scale}`} />
              
              <line x1={O.x} y1={O.y} x2={kChordP1.x} y2={kChordP1.y} stroke="#cbd5e1" strokeWidth={1.5 * scale} strokeDasharray={`${6*scale},${6*scale}`} />
              <line x1={O.x} y1={O.y} x2={kP2.x} y2={kP2.y} stroke="#cbd5e1" strokeWidth={1.5 * scale} strokeDasharray={`${6*scale},${6*scale}`} />
              
              <line x1={O.x} y1={O.y} x2={K.x} y2={K.y} stroke="#94a3b8" strokeWidth={1.5 * scale} strokeDasharray={`${4*scale},${4*scale}`} />
              
              {kChord !== 'AB' && <line x1={kChordP1.x} y1={kChordP1.y} x2={kP2.x} y2={kP2.y} stroke="#9ca3af" strokeWidth={1.5 * scale} strokeDasharray={`${4*scale},${4*scale}`} />}
              
              {C && (
                <React.Fragment>
                  <line x1={A.x} y1={A.y} x2={C.x} y2={C.y} stroke="#475569" strokeWidth={1.5 * scale} />
                  <line x1={B.x} y1={B.y} x2={C.x} y2={C.y} stroke="#475569" strokeWidth={1.5 * scale} />
                </React.Fragment>
              )}
              
              <line x1={A.x} y1={A.y} x2={M.x} y2={M.y} stroke="#475569" strokeWidth={1.5 * scale} />
              <line x1={B.x} y1={B.y} x2={N.x} y2={N.y} stroke="#475569" strokeWidth={1.5 * scale} />
              <line x1={A.x} y1={A.y} x2={B.x} y2={B.y} stroke="#475569" strokeWidth={1.5 * scale} />
              
              <line x1={E_line_start.x} y1={E_line_start.y} x2={E_line_end.x} y2={E_line_end.y} stroke="#334155" strokeWidth={2.5 * scale} strokeLinecap="round" />

              {[
                { p: O, label: "O", ox: 0, oy: 22 }, { p: A, label: "A", ox: -16, oy: 16 }, { p: B, label: "B", ox: 16, oy: 16 },
                { p: M, label: "M", ox: 16, oy: -16 }, { p: N, label: "N", ox: -16, oy: -16 }, 
                { p: K, label: "K", ox: Math.cos(degToRad(angleK)) * 22, oy: Math.sin(degToRad(angleK)) * 22 }, 
                { p: P, label: "P", ox: 0, oy: -18 }, { p: C, label: "C", ox: 0, oy: -22 }, { p: E, label: "E", ox: 16, oy: -16 }
              ].map((pt, i) => pt.p && (
                <g key={i}>
                  <circle cx={pt.p.x} cy={pt.p.y} r={3.5 * scale} fill="#3B82F6" stroke="#ffffff" strokeWidth={1.5 * scale} />
                  <text x={pt.p.x + pt.ox * scale} y={pt.p.y + pt.oy * scale} fontSize={17 * scale} fontFamily="serif" fontStyle="italic" fontWeight="bold" fill="#1e293b" textAnchor="middle" dominantBaseline="middle">{pt.label}</text>
                </g>
              ))}

              {givenKeys.map(key => {
                const pos = labelPositions[key];
                if (!pos) return null;
                return (
                  <g key={key}>
                    <text x={pos.x} y={pos.y} fontSize={15 * scale} fill="white" fontWeight="900" stroke="white" strokeWidth={4 * scale} strokeLinejoin="round" textAnchor="middle" dominantBaseline="middle">{vals[key]}°</text>
                    <text x={pos.x} y={pos.y} fontSize={15 * scale} fill="#ea580c" fontWeight="900" textAnchor="middle" dominantBaseline="middle">{vals[key]}°</text>
                  </g>
                );
              })}

              {examWatermark && (
                <text 
                  x={cx} y={cy} 
                  fontSize={40 * scale} 
                  fill="#94a3b8" 
                  opacity="0.2" 
                  transform={`rotate(-25 ${cx} ${cy})`} 
                  textAnchor="middle" 
                  dominantBaseline="middle" 
                  style={{ pointerEvents: 'none', userSelect: 'none', fontWeight: '900', letterSpacing: '2px' }}
                >
                  {examWatermark}
                </text>
              )}
            </svg>
          );
        };

        // --- ОСНОВНО ПРИЛОЖЕНИЕ ---
        function GeometryApp() {
          const [currentScreen, setCurrentScreen] = useState('home');
          const [baseAngle, setBaseAngle] = useState(30);
          const [arcAB, setArcAB] = useState(120);
          const [arcBM, setArcBM] = useState(120);
          const [angleMAN, setAngleMAN] = useState(20);
          const [kChord, setKChord] = useState('AN'); 
          const [mode, setMode] = useState('learn'); 
          const [userAnswers, setUserAnswers] = useState({});
          
          const [studentNumber, setStudentNumber] = useState('');
          const [studentClass, setStudentClass] = useState('');
          const [examGenerated, setExamGenerated] = useState(false);

          const [isPrintPreview, setIsPrintPreview] = useState(false);
          const [printModeType, setPrintModeType] = useState('variants'); 
          const [isGenerating, setIsGenerating] = useState(false);
          
          const [isTeacherMode, setIsTeacherMode] = useState(false);
          const [clickCount, setClickCount] = useState(0);
          const [teacherKeyClass, setTeacherKeyClass] = useState('B');

          const [variants, setVariants] = useState([]);
          const [interactiveGivenKeys, setInteractiveGivenKeys] = useState(GIVEN_TEMPLATES[0]);

          const getVariantByNumber = (num, cls = 'B') => {
            let classOffset = cls ? cls.toUpperCase().charCodeAt(0) * 137 : 0;
            let seed = parseInt(num) + classOffset + 12345;
            const rand = () => seededRandom(seed++);
            
            let v_arcAB, v_arcBM, v_angleMAN, arcMN, arcAN;
            let attempts = 0;
            do {
              attempts++;
              v_arcAB = Math.floor(rand() * 8 + 5) * 10; 
              v_arcBM = Math.floor(rand() * 8 + 5) * 10; 
              v_angleMAN = Math.floor(rand() * 5 + 3) * 5; 
              arcMN = v_angleMAN * 2;
              arcAN = 360 - v_arcAB - v_arcBM - arcMN;
              if(attempts > 100) break; 
            } while (v_arcAB + v_arcBM + arcMN >= 340 || arcAN < 20 || Math.abs(v_arcAB - arcMN) < 30);

            const CHORDS = ['AN', 'AB', 'BM', 'MN'];
            const randChord = CHORDS[Math.floor(rand() * 4)];

            let arcKFullVal;
            if (randChord === 'AB') arcKFullVal = v_arcAB;
            else if (randChord === 'BM') arcKFullVal = v_arcBM;
            else if (randChord === 'MN') arcKFullVal = arcMN;
            else arcKFullVal = arcAN;

            const vals = {
              arcAB: v_arcAB, arcBM: v_arcBM, arcMN: arcMN, arcAN: arcAN,
              angleAOB: v_arcAB, angleMAN: v_angleMAN, angleBAM: v_arcBM / 2,
              angleMBE: v_arcBM / 2, angleMPN: (v_arcAB + arcMN) / 2,
              angleACB: Math.abs(v_arcAB - arcMN) / 2, angleHalfK: arcKFullVal / 2
            };

            const templates = getTemplatesForKChord(randChord);
            const tmplIndex = Math.floor(rand() * templates.length);
            const givenKeys = templates[tmplIndex];
            const soughtKeys = ALL_KEYS.filter(k => !givenKeys.includes(k));

            return { id: num, arcAB: v_arcAB, arcBM: v_arcBM, angleMAN: v_angleMAN, kChord: randChord, givenKeys, soughtKeys, vals };
          };

          useEffect(() => {
            if (clickCount >= 5) {
              setIsTeacherMode(prev => !prev);
              setClickCount(0);
            } else if (clickCount > 0) {
              const timer = setTimeout(() => setClickCount(0), 1200);
              return () => clearTimeout(timer);
            }
          }, [clickCount]);

          const correctAnswers = useMemo(() => {
            const arcMN = angleMAN * 2;
            const arcAN = 360 - arcAB - arcBM - arcMN;
            let arcKFullVal;
            if (kChord === 'AB') arcKFullVal = arcAB;
            else if (kChord === 'BM') arcKFullVal = arcBM;
            else if (kChord === 'MN') arcKFullVal = arcMN;
            else arcKFullVal = arcAN;

            return {
              arcAB, arcBM, arcMN, arcAN, 
              angleAOB: arcAB, angleMAN, angleBAM: arcBM / 2, 
              angleMBE: arcBM / 2, angleMPN: (arcAB + arcMN) / 2, 
              angleACB: Math.abs(arcAB - arcMN) / 2, angleHalfK: arcKFullVal / 2
            };
          }, [arcAB, arcBM, angleMAN, kChord]);

          const isPossible = arcAB + arcBM + (angleMAN * 2) < 360;

          const handleAnswerChange = (field, value) => setUserAnswers(prev => ({ ...prev, [field]: value }));
          const clearAnswers = () => setUserAnswers({});

          const generateNewInteractiveProblem = () => {
            let v_arcAB, v_arcBM, v_angleMAN, arcMN, arcAN;
            do {
              v_arcAB = Math.floor(Math.random() * 8 + 5) * 10; 
              v_arcBM = Math.floor(Math.random() * 8 + 5) * 10; 
              v_angleMAN = Math.floor(Math.random() * 5 + 3) * 5; 
              arcMN = v_angleMAN * 2;
              arcAN = 360 - v_arcAB - v_arcBM - arcMN;
            } while (v_arcAB + v_arcBM + arcMN >= 340 || arcAN < 20 || Math.abs(v_arcAB - arcMN) < 30);
            
            setArcAB(v_arcAB); setArcBM(v_arcBM); setAngleMAN(v_angleMAN);
            
            const newKChord = ['AN', 'AB', 'BM', 'MN'][Math.floor(Math.random() * 4)];
            setKChord(newKChord);
            const templates = getTemplatesForKChord(newKChord);
            setInteractiveGivenKeys(templates[Math.floor(Math.random() * templates.length)]);
            
            clearAnswers();
          };

          const handleGenerateAndPrint = () => {
            setIsGenerating(true);
            setTimeout(() => {
              let newVariants = [];
              let attempts = 0;
  
              while (newVariants.length < 17 && attempts < 2000) {
                attempts++;
                const v_arcAB = Math.floor(Math.random() * 8 + 5) * 10; 
                const v_arcBM = Math.floor(Math.random() * 8 + 5) * 10; 
                const v_angleMAN = Math.floor(Math.random() * 5 + 3) * 5; 
                const arcMN = v_angleMAN * 2;
                
                if (v_arcAB + v_arcBM + arcMN >= 340) continue; 
                const arcAN = 360 - v_arcAB - v_arcBM - arcMN;
                if (arcAN < 20) continue;
                if (Math.abs(v_arcAB - arcMN) < 30) continue;
  
                const randChord = ['AN', 'AB', 'BM', 'MN'][Math.floor(Math.random() * 4)];
                let arcKFullVal;
                if (randChord === 'AB') arcKFullVal = v_arcAB;
                else if (randChord === 'BM') arcKFullVal = v_arcBM;
                else if (randChord === 'MN') arcKFullVal = arcMN;
                else arcKFullVal = arcAN;

                const vals = {
                  arcAB: v_arcAB, arcBM: v_arcBM, arcMN: arcMN, arcAN: arcAN,
                  angleAOB: v_arcAB, angleMAN: v_angleMAN, angleBAM: v_arcBM / 2,
                  angleMBE: v_arcBM / 2, angleMPN: (v_arcAB + arcMN) / 2,
                  angleACB: Math.abs(v_arcAB - arcMN) / 2, angleHalfK: arcKFullVal / 2
                };
  
                const templates = getTemplatesForKChord(randChord);
                const givenKeys = templates[Math.floor(Math.random() * templates.length)];
                const soughtKeys = ALL_KEYS.filter(k => !givenKeys.includes(k));
  
                newVariants.push({ id: newVariants.length + 1, arcAB: v_arcAB, arcBM: v_arcBM, angleMAN: v_angleMAN, kChord: randChord, givenKeys, soughtKeys, vals });
              }
  
              setVariants(newVariants);
              setPrintModeType('variants');
              setIsPrintPreview(true);
              setIsGenerating(false);
  
              setTimeout(() => { window.print(); }, 500); 
            }, 100);
          };

          const handleExamGenerate = () => {
            if(!studentClass.trim()) {
                alert("Моля, въведете буква на вашата паралелка (например B, C, D).");
                return;
            }
            if(!studentNumber || isNaN(studentNumber) || studentNumber < 1 || studentNumber > 50) {
                alert("Моля, въведете валиден номер в клас (от 1 до 50).");
                return;
            }
            const variant = getVariantByNumber(studentNumber, studentClass);
            setArcAB(variant.arcAB);
            setArcBM(variant.arcBM);
            setAngleMAN(variant.angleMAN);
            setKChord(variant.kChord);
            setInteractiveGivenKeys(variant.givenKeys);
            setExamGenerated(true);
            clearAnswers();
          };

              const vars = [];
              for(let i=1; i<=30; i++) vars.push(getVariantByNumber(i, teacherKeyClass));
              return vars;
          }, [teacherKeyClass]);

              if (mode === 'exam') {
                  e.preventDefault();
              }

          const displaySoughtKeys = ALL_KEYS.filter(k => !displayGivenKeys.includes(k));

                  <button onClick={() => setIsPrintPreview(false)} style={{ backgroundColor: '#64748b', color: 'white', padding: '10px 15px', borderRadius: '5px', fontWeight: 'bold', border: 'none', borderBottom: '4px solid #475569', cursor: 'pointer' }}>❌ Назад</button>
                </div>

                {printModeType === 'keyOnly' ? (

                    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px', color: 'black', fontFamily: 'Arial, sans-serif' }}>
                      <thead>
                        <tr>

                          {ALL_KEYS.map(k => <th key={k} style={{ border: '1px solid #000', padding: '6px', backgroundColor: '#f3f4f6', textAlign: 'center' }}>{k === 'angleHalfK' ? <Ang>K...</Ang> : LABEL_MAP[k]}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                        {allVariants.map(v => (
                          <tr key={`ans-${v.id}`}>
                            <td style={{ border: '1px solid #000', padding: '4px', fontWeight: 'bold', textAlign: 'center' }}>{v.id}</td>
                            {ALL_KEYS.map(k => {
                              const isGiven = v.givenKeys.includes(k);
                              let subLabel = null;
                              if (k === 'angleHalfK') {
                                  subLabel = v.kChord === 'AB' ? 'KOA' : v.kChord === 'BM' ? 'KOB' : v.kChord === 'MN' ? 'KOM' : 'KOA';
                              }
                              return (
                                <td key={k} style={{ border: '1px solid #000', padding: '4px', textAlign: 'center', backgroundColor: isGiven ? '#e2e8f0' : 'transparent', fontWeight: isGiven ? 'bold' : 'normal' }}>
                                    {v.vals[k]}°

                      </tbody>
                    </table>
                  </div>
                ) : (

                    {variants.map((v) => (

                        <h1 style={{ fontSize: '24px', fontWeight: 'bold', textAlign: 'center', marginBottom: '30px', color: 'black' }}>
                          Контролна работа: Окръжност и ъгли

                          <div style={{ clear: 'both' }}></div>
                        </div>
                        <div style={{ fontSize: '18px', color: 'black', marginBottom: '15px', lineHeight: '1.5', fontFamily: '"Times New Roman", Times, serif' }}>

                          Намерете:
                        </div>
                        <table style={{ width: '100%', fontSize: '18px', color: 'black', fontWeight: 'bold', marginBottom: '30px', fontFamily: 'Arial, sans-serif' }}>

                            <tr>
                              <td style={{ paddingBottom: '15px' }}>а) {renderLabel(v.soughtKeys[0], v.kChord)} = ........</td>
                              <td style={{ paddingBottom: '15px' }}>б) {renderLabel(v.soughtKeys[1], v.kChord)} = ........</td>
                            </tr>
                            <tr>
                              <td style={{ paddingBottom: '15px' }}>в) {renderLabel(v.soughtKeys[2], v.kChord)} = ........</td>
                              <td style={{ paddingBottom: '15px' }}>г) {renderLabel(v.soughtKeys[3], v.kChord)} = ........</td>
                            </tr>
                            <tr>
                              <td style={{ paddingBottom: '15px' }}>д) {renderLabel(v.soughtKeys[4], v.kChord)} = ........</td>
                              <td style={{ paddingBottom: '15px' }}>е) {renderLabel(v.soughtKeys[5], v.kChord)} = ........</td>
                            </tr>
                            <tr>
                              <td style={{ paddingBottom: '15px' }}>ж) {renderLabel(v.soughtKeys[6], v.kChord)} = ........</td>
                              <td style={{ paddingBottom: '15px' }}>з) {renderLabel(v.soughtKeys[7], v.kChord)} = ........</td>
                            </tr>
                          </tbody>
                        </table>
                        <div style={{ textAlign: 'center', marginTop: '10px' }}>
                          <div style={{ display: 'inline-block', width: '100%', maxWidth: '600px' }}>
                            <GeometryDrawing baseAngle={20} arcAB={v.arcAB} arcBM={v.arcBM} angleMAN={v.angleMAN} kChord={v.kChord} givenKeys={v.givenKeys} vals={v.vals} />
                          </div>
                        </div>
                      </div>
                    ))}
                    <div style={{ pageBreakBefore: 'always', breakBefore: 'page', marginTop: '40px', padding: '20px' }}>
                      <h2 style={{ fontSize: '22px', fontWeight: 'bold', textAlign: 'center', marginBottom: '20px', color: 'black' }}>Ключ с верни отговори (Оцветените полета са даденото по условие)</h2>
                      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px', color: 'black', fontFamily: 'Arial, sans-serif' }}>
                        <thead>
                          <tr>
                            <th style={{ border: '1px solid #000', padding: '6px', backgroundColor: '#f3f4f6', textAlign: 'center' }}>Вар.</th>
                            {ALL_KEYS.map(k => <th key={k} style={{ border: '1px solid #000', padding: '6px', backgroundColor: '#f3f4f6', textAlign: 'center' }}>{k === 'angleHalfK' ? <Ang>K...</Ang> : LABEL_MAP[k]}</th>)}
                          </tr>
                        </thead>
                        <tbody>
                          {variants.map(v => (
                            <tr key={`ans-${v.id}`}>
                              <td style={{ border: '1px solid #000', padding: '4px', fontWeight: 'bold', textAlign: 'center' }}>{v.id}</td>
                              {ALL_KEYS.map(k => {
                                const isGiven = v.givenKeys.includes(k);
                                return <td key={k} style={{ border: '1px solid #000', padding: '4px', textAlign: 'center', backgroundColor: isGiven ? '#e2e8f0' : 'transparent', fontWeight: isGiven ? 'bold' : 'normal' }}>{v.vals[k]}°</td>;
                              })}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>

              </div>

                <div className="absolute top-[20%] right-[-10%] w-64 md:w-96 h-64 md:h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-2000"></div>

                <main className="flex-grow flex flex-col items-center justify-center py-10 w-full max-w-6xl mx-auto z-10">
                  <h1 
                    className="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 via-blue-600 to-indigo-700 text-center mb-6 md:mb-8 drop-shadow-sm pb-2 cursor-pointer select-none"
                    onClick={() => setClickCount(prev => prev + 1)}
                    title="Кликнете 5 пъти бързо за Учителски режим"
                  >
                    Окръжност и ъгли
                    <span className="block text-lg sm:text-2xl md:text-3xl font-medium text-slate-500 mt-2 md:mt-3 tracking-wide">Динамичен образователен модел</span>
                    {isTeacherMode && <span className="block text-sm md:text-xl text-green-600 mt-4 bg-green-100/80 rounded-full px-4 py-1 mx-auto w-max font-bold border border-green-200">✅ Учителски режим активен</span>}
                  </h1>

                  <div className="w-full max-w-4xl bg-white p-3 md:p-4 rounded-3xl shadow-2xl border border-white/50 mb-10 md:mb-14 flex justify-center items-center overflow-hidden min-h-[200px] sm:min-h-[250px] md:min-h-[350px] transform hover:scale-[1.02] smooth-transition backdrop-blur-sm bg-white/70">
                    <img 
                      src="AOIU.png" 
                      alt="Окръжност и ъгъл лого" 
                      className="max-w-full h-auto max-h-[40vh] object-contain rounded-2xl"
                      onError={(e) => {
                        e.target.onerror = null; 
                        e.target.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 300'><rect width='400' height='300' fill='%23f8fafc'/><circle cx='200' cy='150' r='100' fill='none' stroke='%233b82f6' stroke-width='4'/><line x1='100' y1='150' x2='300' y2='150' stroke='%239ca3af' stroke-dasharray='5,5'/><path d='M 200 150 L 270 80' stroke='%23334155' stroke-width='2'/><path d='M 200 150 L 270 220' stroke='%23334155' stroke-width='2'/><circle cx='200' cy='150' r='4' fill='%23ef4444'/><text x='200' y='280' font-family='sans-serif' font-size='16' fill='%2364748b' text-anchor='middle'>Интерактивна Геометрия</text></svg>";
                        e.target.classList.add('animate-float');
                      }}

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8 mb-10 md:mb-16 w-full max-w-5xl mx-auto">
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-lg hover:shadow-xl smooth-transition transform hover:-translate-y-1 border-t-4 border-blue-500">
                      <div className="w-10 h-10 md:w-12 md:h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-xl md:text-2xl mb-4 shadow-inner">📖</div>
                      <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-2 md:mb-3">Режим "Обучение"</h3>
                      <p className="text-slate-600 text-sm leading-relaxed">

                      </p>
                    </div>
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-lg hover:shadow-xl smooth-transition transform hover:-translate-y-1 border-t-4 border-emerald-500">
                      <div className="w-10 h-10 md:w-12 md:h-12 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 text-xl md:text-2xl mb-4 shadow-inner">✍️</div>
                      <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-2 md:mb-3">Режим "Тренировка"</h3>
                      <p className="text-slate-600 text-sm leading-relaxed">

                    </div>
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-lg hover:shadow-xl smooth-transition transform hover:-translate-y-1 border-t-4 border-purple-500">
                      <div className="w-10 h-10 md:w-12 md:h-12 bg-purple-100 rounded-full flex items-center justify-center text-purple-600 text-xl md:text-2xl mb-4 shadow-inner">🎓</div>
                      <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-2 md:mb-3">Режим "Изпит"</h3>

                  <button 
                    onClick={() => setCurrentScreen('app')}
                    className="group relative inline-flex items-center justify-center px-8 py-4 md:px-14 md:py-5 text-xl md:text-2xl font-black text-white bg-gradient-to-br from-cyan-400 via-blue-500 to-indigo-600 rounded-full shadow-[0_10px_40px_rgba(59,130,246,0.5)] border-b-[6px] md:border-b-[8px] border-indigo-800 hover:border-b-[3px] hover:translate-y-[3px] active:border-b-0 active:translate-y-[6px] md:hover:border-b-[4px] md:hover:translate-y-[4px] md:active:border-b-0 md:active:translate-y-[8px] transition-all duration-150 overflow-hidden w-full sm:w-auto"

                <footer className="w-full bg-white/50 backdrop-blur-md py-6 border-t border-slate-200 mt-auto z-10 px-4">

                <div className="flex justify-between items-center bg-slate-50 p-2 md:p-2.5 rounded-2xl border border-slate-200 shadow-sm">

                  >
                    <svg className="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>

                )}

                <div className="flex bg-slate-100 p-1 md:p-1.5 rounded-2xl shadow-inner border border-slate-200/60">
                  <button className={`flex-1 py-2 md:py-2.5 text-xs md:text-sm font-bold rounded-xl smooth-transition ${mode === 'learn' ? 'bg-white shadow-md text-blue-600 border border-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`} onClick={() => { setMode('learn'); clearAnswers(); }}>📖 Обучение</button>
                  <button className={`flex-1 py-2 md:py-2.5 text-xs md:text-sm font-bold rounded-xl smooth-transition ${mode === 'test' ? 'bg-white shadow-md text-emerald-600 border border-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`} onClick={() => { setMode('test'); clearAnswers(); setExamGenerated(false); }}>✍️ Тренировка</button>
                  <button className={`flex-1 py-2 md:py-2.5 text-xs md:text-sm font-bold rounded-xl smooth-transition ${mode === 'exam' ? 'bg-white shadow-md text-purple-600 border border-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`} onClick={() => { setMode('exam'); clearAnswers(); setExamGenerated(false); }}>🎓 Изпит</button>
                </div>

                {mode === 'exam' && !examGenerated && (
                  <div className="p-6 bg-purple-50 rounded-2xl border border-purple-200 shadow-sm text-center">
                    <h2 className="text-lg font-bold text-purple-800 mb-4">Въведете вашите данни:</h2>
                    <div className="flex justify-center gap-4 mb-6">
                      <div className="flex flex-col items-center">
                        <label className="text-[11px] font-extrabold text-purple-500 uppercase tracking-wider mb-1">Паралелка</label>
                        <input 
                          type="text" maxLength="1"
                          value={studentClass}
                          onChange={(e) => setStudentClass(e.target.value.toUpperCase())}
                          className="w-16 text-2xl font-bold text-center border-2 border-purple-300 rounded-xl p-2 outline-none focus:border-purple-500 focus:ring-4 focus:ring-purple-200 bg-white"
                          placeholder="B"
                        />
                      </div>
                      <div className="flex flex-col items-center">
                        <label className="text-[11px] font-extrabold text-purple-500 uppercase tracking-wider mb-1">Номер</label>
                        <input 
                          type="number" min="1" max="50"
                          value={studentNumber}
                          onChange={(e) => setStudentNumber(e.target.value)}
                          className="w-24 text-2xl font-bold text-center border-2 border-purple-300 rounded-xl p-2 outline-none focus:border-purple-500 focus:ring-4 focus:ring-purple-200 bg-white"
                          placeholder="15"
                        />
                      </div>
                    </div>
                    <button 
                      onClick={handleExamGenerate}
                      className="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3.5 rounded-xl shadow-md border-b-4 border-purple-800 active:border-b-0 active:translate-y-1 transition-all text-lg"
                    >
                      Генерирай моята задача
                    </button>
                  </div>
                )}

                {(!isPossible && mode !== 'exam') && <div className="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 md:p-4 text-sm font-bold rounded-r-xl shadow-sm">Невалидна конфигурация на ъглите!</div>}

                {((mode !== 'exam') || (mode === 'exam' && examGenerated)) && (
                  <React.Fragment>
                    <div className={`p-4 md:p-5 bg-gradient-to-br from-amber-50 to-orange-50 rounded-2xl border border-amber-200/60 text-[14px] md:text-[15px] leading-relaxed text-slate-800 shadow-sm font-serif ${mode === 'exam' ? 'no-select' : ''}`}>
                      На чертежа точките <i>A, B, M, N</i> и <i>K</i> лежат на окръжност с център <i>O</i>. Правата <i>BE</i> е допирателна към окръжността, а отсечката <i>KO</i> е перпендикулярна на хордата <i>{kChord}</i>. 
                      <div className="mt-2 md:mt-3 p-2 md:p-3 bg-white/70 backdrop-blur-sm border border-amber-200 rounded-xl font-sans shadow-sm leading-normal">
                        Ако {displayGivenKeys.map((key, i) => <span key={key} className="whitespace-nowrap"><b>{renderLabel(key, kChord)} = {correctAnswers[key]}°</b>{i < displayGivenKeys.length - 1 ? ', ' : ''}</span>)}, намерете:
                      </div>
                    </div>

                    <div className={`flex md:hidden w-full bg-white shadow-sm border border-slate-200 rounded-2xl p-2 items-center justify-center relative my-1 ${mode === 'exam' ? 'no-select' : ''}`}>
                      <GeometryDrawing baseAngle={baseAngle} arcAB={arcAB} arcBM={arcBM} angleMAN={angleMAN} kChord={kChord} givenKeys={displayGivenKeys} vals={correctAnswers} examWatermark={currentWatermark} />
                    </div>

                    {mode === 'learn' && (
                      <div className="space-y-3 md:space-y-4 p-4 md:p-5 bg-slate-50 rounded-2xl border border-slate-200">
                        <h3 className="text-[10px] md:text-[11px] font-extrabold text-slate-400 uppercase tracking-widest mb-2 md:mb-3 border-b border-slate-200 pb-2">Настройки на чертежа</h3>
                        <div>
                          <label className="flex justify-between text-[11px] md:text-xs mb-1 md:mb-1.5 text-slate-500 font-bold"><span>Ротация</span> <span className="bg-white px-2 py-0.5 rounded shadow-sm border border-slate-200">{baseAngle}°</span></label>
                          <input type="range" min="0" max="360" value={baseAngle} onChange={(e) => setBaseAngle(Number(e.target.value))} className="w-full accent-slate-400 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                        </div>
                        
                        <div className="mt-3">
                          <label className="flex justify-between text-xs md:text-sm font-semibold mb-1 md:mb-1.5 text-slate-700">
                            <span>Хорда за KO (<span className="font-serif italic text-base">⊥</span>)</span> 
                          </label>
                          <div className="flex gap-1 bg-slate-200 p-1 rounded-lg">
                             {['AN', 'AB', 'BM', 'MN'].map(ch => (
                                <button 
                                   key={ch}
                                   onClick={() => setKChord(ch)}
                                   className={`flex-1 py-1.5 text-xs font-bold rounded-md smooth-transition ${kChord === ch ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:bg-slate-300'}`}
                                >
                                   {ch}
                                </button>
                             ))}
                          </div>
                        </div>

                        <div>
                          <label className="flex justify-between text-xs md:text-sm font-semibold mb-1 md:mb-1.5 text-slate-700"><span>{LABEL_MAP.arcAB} (и {LABEL_MAP.angleAOB})</span> <span className="bg-white px-2 py-0.5 rounded shadow-sm border border-slate-200 text-blue-600">{arcAB}°</span></label>
                          <input type="range" min="30" max="180" step="10" value={arcAB} onChange={(e) => setArcAB(Number(e.target.value))} className="w-full accent-blue-500 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                        </div>
                        <div>
                          <label className="flex justify-between text-xs md:text-sm font-semibold mb-1 md:mb-1.5 text-slate-700"><span>{LABEL_MAP.arcBM}</span> <span className="bg-white px-2 py-0.5 rounded shadow-sm border border-slate-200 text-blue-600">{arcBM}°</span></label>
                          <input type="range" min="30" max="180" step="10" value={arcBM} onChange={(e) => setArcBM(Number(e.target.value))} className="w-full accent-blue-500 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                        </div>
                        <div>
                          <label className="flex justify-between text-xs md:text-sm font-semibold mb-1 md:mb-1.5 text-slate-700"><span>Вписан {LABEL_MAP.angleMAN}</span> <span className="bg-white px-2 py-0.5 rounded shadow-sm border border-slate-200 text-blue-600">{angleMAN}°</span></label>
                          <input type="range" min="10" max="60" step="5" value={angleMAN} onChange={(e) => setAngleMAN(Number(e.target.value))} className="w-full accent-blue-500 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                        </div>
                      </div>
                    )}

                    {mode === 'exam' && examGenerated && (
                      <div className="bg-purple-100 border border-purple-300 text-purple-900 p-4 rounded-xl shadow-sm text-sm font-bold text-center mb-4">
                        Това е вашата персонална задача за <b>номер {studentNumber} от {studentClass.toUpperCase()} клас</b>.<br/>
                        <span className="text-red-600 text-xs uppercase tracking-wider block mt-2">Внимание: Копирането е забранено!</span>
                      </div>
                    )}

                    <div className={`${mode === 'learn' ? 'bg-blue-50/50 border-blue-100' : mode === 'exam' ? 'bg-purple-50/50 border-purple-100 no-select' : 'bg-emerald-50/50 border-emerald-100'} border p-4 md:p-5 rounded-2xl flex-grow mb-6 md:mb-0`}>
                      <h2 className={`text-[10px] md:text-[11px] font-extrabold uppercase tracking-widest mb-2 md:mb-3 border-b pb-2 ${mode === 'learn' ? 'text-blue-400 border-blue-200' : mode === 'exam' ? 'text-purple-400 border-purple-200' : 'text-emerald-500 border-emerald-200'}`}>
                        {mode === 'learn' ? 'Решение (Автоматично)' : mode === 'exam' ? 'Списък с търсените елементи:' : 'Въведете вашите отговори'}
                      </h2>
                      <ul className="space-y-1.5">
                        {displaySoughtKeys.map((key, i) => {
                          const valStr = userAnswers[key];
                          const isAnswered = valStr !== undefined && valStr !== '';
                          const isCorrect = isAnswered && parseFloat(valStr) === correctAnswers[key];
                          const isWrong = isAnswered && !isCorrect;

                          if (mode === 'learn') return (
                            <li key={key} className="flex justify-between items-center border-b border-blue-200/50 py-2 hover:bg-blue-100/50 px-2 md:px-3 rounded-xl smooth-transition text-[13px] sm:text-sm">
                              <span className="text-slate-700">{String.fromCharCode(1072 + i)}) Мярка на <b>{renderLabel(key, kChord)}</b></span>
                              <span className="font-bold text-blue-700 text-sm md:text-base bg-white px-2 md:px-3 py-1 rounded-lg shadow-sm border border-blue-200">{correctAnswers[key]}°</span>
                            </li>
                          );
                          
                          if (mode === 'exam') return (
                            <li key={key} className="flex justify-between items-center border-b border-purple-200/30 py-2 hover:bg-white/40 px-2 md:px-3 rounded-xl smooth-transition text-[13px] sm:text-sm">
                              <span className="text-slate-800 font-medium">{String.fromCharCode(1072 + i)}) {renderLabel(key, kChord)} = ?</span>
                            </li>
                          );

                          return (
                            <li key={key} className="flex flex-wrap sm:flex-nowrap justify-between items-center border-b border-emerald-200/30 py-2 hover:bg-white/40 px-1.5 md:px-2 rounded-xl smooth-transition gap-2">
                              <span className="text-slate-700 font-medium text-[13px] sm:text-sm">{String.fromCharCode(1072 + i)}) Мярка на <b className="text-slate-900">{renderLabel(key, kChord)}</b></span>
                              <div className="flex items-center gap-1 sm:gap-2 ml-auto">
                                <div className="relative">
                                  <input 
                                    type="number" 
                                    value={userAnswers[key] || ''} 
                                    onChange={(e) => handleAnswerChange(key, e.target.value)} 
                                    placeholder="..."
                                    className={`w-[60px] md:w-[72px] px-1 md:px-2 py-1.5 pr-4 md:pr-6 text-center font-bold border-2 rounded-xl outline-none smooth-transition bg-white shadow-sm text-sm md:text-base
                                      ${isCorrect ? 'border-emerald-400 text-emerald-700 bg-emerald-50 focus:border-emerald-500' : 
                                        isWrong ? 'border-red-400 text-red-700 bg-red-50 focus:border-red-500' : 
                                        'border-slate-200 focus:border-indigo-400 text-slate-800 focus:ring-4 focus:ring-indigo-100'}`} 
                                  />
                                  <span className="absolute right-1 md:right-2 top-1/2 -translate-y-1/2 text-slate-400 font-bold select-none pointer-events-none text-xs md:text-sm">°</span>
                                </div>
                                <span className="w-5 md:w-6 text-center text-base md:text-lg drop-shadow-sm select-none">
                                  {isCorrect ? '✅' : isWrong ? '❌' : ''}
                                </span>
                              </div>
                            </li>
                          );
                        })}
                      </ul>

                      {mode === 'test' && (
                        <div className="mt-6 md:mt-8 flex flex-col sm:flex-row gap-2 md:gap-3">
                          <button onClick={generateNewInteractiveProblem} className="flex-1 bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 md:py-3.5 px-3 md:px-4 rounded-xl shadow-md border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center gap-2 text-sm md:text-base">
                            <span className="text-lg md:text-xl">🔄</span> Нова задача
                          </button>
                          <button onClick={clearAnswers} className="bg-white hover:bg-slate-50 text-slate-600 font-bold py-3 md:py-3.5 px-3 md:px-4 rounded-xl shadow-sm border-2 border-b-4 border-slate-200 active:border-b-2 active:translate-y-0.5 transition-all text-sm md:text-base">
                            Изчисти
                          </button>
                        </div>
                      )}
                    </div>
                  </React.Fragment>
                )}
              </div>

              <div className={`hidden md:flex w-full md:w-[55%] lg:w-[62%] items-center justify-center p-6 lg:p-8 bg-slate-100 overflow-hidden relative border-l border-slate-200 ${mode === 'exam' ? 'no-select' : ''}`}>
                {(!isPossible && mode !== 'exam') || (mode === 'exam' && !examGenerated) ? (
                  <div className="w-full h-full max-w-4xl bg-white/50 border-4 border-dashed border-slate-300 rounded-[2rem] flex items-center justify-center text-slate-400 font-bold text-xl">
                    Чертежът ще се появи тук
                  </div>
                ) : (
                  <div className="w-full h-full max-w-4xl bg-white shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] rounded-[2rem] overflow-hidden p-6 lg:p-8 flex items-center justify-center relative border border-slate-200/60">
                     <GeometryDrawing baseAngle={baseAngle} arcAB={arcAB} arcBM={arcBM} angleMAN={angleMAN} kChord={kChord} givenKeys={displayGivenKeys} vals={correctAnswers} examWatermark={currentWatermark} />
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GeometryApp />);
    </script>
</body>
</html>
